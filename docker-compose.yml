version: "3.9"

# ─────────────────────────────────────────────────────
#  ReviseAI – Docker Compose
#  Services: backend (FastAPI) + frontend (React/Nginx)
# ─────────────────────────────────────────────────────

services:

  # ── Backend (FastAPI + SQLite) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviseai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # loads DATABASE_URL, SECRET_KEY, etc.
    volumes:
      - db_data:/app/data       # persist the SQLite database file
    ports:
      - "8000:8000"             # http://localhost:8000
    networks:
      - reviseai-net

  # ── Frontend (React → Nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reviseai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"               # http://localhost:3000
    depends_on:
      - backend
    networks:
      - reviseai-net

# ── Named Volumes ────────────────────────────────────
volumes:
  db_data:

# ── Shared Network ───────────────────────────────────
networks:
  reviseai-net:
    driver: bridge
